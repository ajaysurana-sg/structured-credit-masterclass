<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow1" cx="15%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#F08C5C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#278D88" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F4A584"/>
      <stop offset="100%" stop-color="#E07042"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F08C5C"/>
      <stop offset="100%" stop-color="#C25734"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#020617"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Top brand row -->
  <g transform="translate(80, 70)">
    <!-- Augury Insights wordmark -->
    <text x="0" y="40" font-family="Georgia, serif" font-weight="700" font-size="46" fill="#FFFFFF">AI</text>
    <line x1="78" y1="8" x2="78" y2="48" stroke="#475569" stroke-width="2"/>
    <text x="100" y="28" font-family="Georgia, serif" font-weight="600" font-size="22" fill="#FFFFFF">Augury</text>
    <text x="100" y="52" font-family="Georgia, serif" font-style="italic" font-weight="500" font-size="22" fill="#F08C5C">Insights</text>
    <!-- Divider -->
    <line x1="270" y1="8" x2="270" y2="48" stroke="#334155" stroke-width="2"/>
    <!-- aurionpro -->
    <text x="290" y="46" font-family="Georgia, serif" font-weight="500" font-size="34" fill="#3DA8A3" letter-spacing="-1">aurionpro</text>
  </g>

  <!-- Eyebrow label -->
  <text x="80" y="220" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="16" fill="#F08C5C" letter-spacing="3">EXECUTIVE MASTERCLASS</text>

  <!-- Accent bar under eyebrow -->
  <rect x="80" y="234" width="60" height="3" rx="1.5" fill="url(#accentBar)"/>

  <!-- Big serif title -->
  <text x="80" y="312" font-family="Georgia, serif" font-weight="800" font-size="78" fill="#F1F5F9" letter-spacing="-2">Structured Credit:</text>
  <text x="80" y="400" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="58" fill="url(#titleGrad)" letter-spacing="-1.5">Risk, Securitisation</text>
  <text x="80" y="460" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="58" fill="url(#titleGrad)" letter-spacing="-1.5">&amp; Capital Relief</text>

  <!-- Divider line -->
  <line x1="80" y1="510" x2="280" y2="510" stroke="#475569" stroke-width="1.5"/>

  <!-- Trainer line -->
  <text x="80" y="550" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="22" fill="#CBD5E1">
    By <tspan font-weight="700" fill="#FFFFFF">Ajay Surana</tspan>
    <tspan fill="#64748B">  ·  </tspan>30+ years in treasury, structured finance &amp; credit risk
  </text>

  <!-- Bottom feature line -->
  <text x="80" y="585" font-family="ui-monospace, Menlo, monospace" font-weight="500" font-size="14" fill="#64748B" letter-spacing="2">36 SLIDES  ·  INTERACTIVE WIDGETS  ·  INDIAN REGULATORY LENS  ·  21 CITATIONS</text>

  <!-- Bottom right URL -->
  <text x="1120" y="585" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-weight="600" font-size="14" fill="#F08C5C" letter-spacing="1">masterclass.beatrisk.org</text>
</svg>
